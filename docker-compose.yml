services:
  app:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mafia}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mafiadb}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PUSHER_APP_ID=${PUSHER_APP_ID}
      - NEXT_PUBLIC_PUSHER_KEY=${NEXT_PUBLIC_PUSHER_KEY}
      - PUSHER_SECRET=${PUSHER_SECRET}
      - PUSHER_CLUSTER=${PUSHER_CLUSTER:-eu}
      - NEXT_PUBLIC_PUSHER_CLUSTER=${NEXT_PUBLIC_PUSHER_CLUSTER}
      - BOOTSTRAP_TOKEN=${BOOTSTRAP_TOKEN}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-admin@mafia.com}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - INITIAL_MODERATOR_EMAIL=${INITIAL_MODERATOR_EMAIL:-}
      - INITIAL_MODERATOR_PASSWORD=${INITIAL_MODERATOR_PASSWORD:-}
      - PRISMA_DB_PUSH_ACCEPT_DATA_LOSS=${PRISMA_DB_PUSH_ACCEPT_DATA_LOSS:-false}
      - DB_BACKUP_DIR=${DB_BACKUP_DIR:-/app/backups}
      - DB_BACKUP_RETENTION_DAYS=${DB_BACKUP_RETENTION_DAYS:-7}
    depends_on:
      db:
        condition: service_healthy
    # Port is not exposed to host to ensure strict zero-trust networking
    ports:
      - "3000:3000"
    volumes:
      - scenario_data:/app/data
      - db_backups:/app/backups

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mafia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mafiadb}
    # Keep Postgres private on Docker's internal network. The app reaches it via db:5432.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia -d mafiadb"]
      interval: 10s
      timeout: 5s
      retries: 12

  db-backup:
    image: postgres:15-alpine
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mafia}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mafiadb}
      - DB_BACKUP_DIR=/backups
      - DB_BACKUP_RETENTION_DAYS=${DB_BACKUP_RETENTION_DAYS:-7}
      - DB_BACKUP_INTERVAL_SECONDS=${DB_BACKUP_INTERVAL_SECONDS:-86400}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - db_backups:/backups
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
    command: ["sh", "/usr/local/bin/backup-db.sh"]

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  pgdata:
  scenario_data:
  db_backups:
